name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: bash build.sh

      - name: Prepare site
        run: |
          mkdir _site
          HASH=$(git rev-parse --short HEAD)
          sed "s|dist/main.js|dist/main.js?v=$HASH|g" index.html > _site/index.html
          cp -r dist _site/
          echo 'gerasim.opencyphal.org' > _site/CNAME

      - uses: actions/upload-pages-artifact@v3

      - uses: actions/deploy-pages@v4
        id: deployment
