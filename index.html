<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyphal Gossip Simulator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #1e1e1e;
    color: #e0e0e0;
    font-family: "SF Mono", "Menlo", "Monaco", "Consolas", monospace;
    font-size: 12px;
    display: flex;
    flex-direction: column;
  }

  #top-bar {
    height: 42px;
    background: #2a2a2a;
    border-bottom: 1px solid #444;
    display: flex;
    align-items: center;
    padding: 0 10px;
    flex-shrink: 0;
  }

  #main-area {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  #canvas-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #sim-canvas {
    display: block;
  }

  #overlay-container {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #overlay-container > * {
    pointer-events: auto;
  }

  #side-panel {
    width: 200px;
    background: #262626;
    border-left: 1px solid #444;
    padding: 12px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  #timeline-container {
    height: 180px;
    background: #1a1a1a;
    border-top: 1px solid #444;
    position: relative;
    flex-shrink: 0;
  }
  #timeline-canvas { display: block; width: 100%; height: 100%; }
  #timeline-tooltip {
    position: absolute; display: none; pointer-events: none;
    background: #333; border: 1px solid #555; padding: 4px 8px;
    font-size: 11px; color: #eee; border-radius: 3px; z-index: 10;
    white-space: pre;
  }
</style>
</head>
<body>
  <div id="top-bar"></div>
  <div id="main-area">
    <div id="canvas-container">
      <canvas id="sim-canvas"></canvas>
      <div id="overlay-container"></div>
    </div>
    <div id="side-panel"></div>
  </div>
  <div id="timeline-container">
    <canvas id="timeline-canvas"></canvas>
    <div id="timeline-tooltip"></div>
  </div>
  <script type="module" src="dist/main.js"></script>
</body>
</html>
